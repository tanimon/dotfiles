name: dotfiles-user
version: 1.0.0
description: User-scope apm manifest managed by chezmoi
target: claude

dependencies:
  apm:
    # anthropics/claude-plugins-official (subdir plugins)
    - anthropics/claude-plugins-official/plugins/claude-code-setup
    - anthropics/claude-plugins-official/plugins/claude-md-management
    - anthropics/claude-plugins-official/plugins/code-review
    - anthropics/claude-plugins-official/plugins/commit-commands
    - anthropics/claude-plugins-official/plugins/feature-dev
    - anthropics/claude-plugins-official/external_plugins/github
    - anthropics/claude-plugins-official/external_plugins/playwright
    - anthropics/claude-plugins-official/plugins/plugin-dev
    - anthropics/claude-plugins-official/plugins/pr-review-toolkit
    - anthropics/claude-plugins-official/plugins/ralph-loop
    # NOTE: gopls-lsp and typescript-lsp are LSP-only plugins. Their plugin
    # subdirs contain only LICENSE/README; the actual configuration lives in
    # marketplace.json's `lspServers` field — a Claude Code-specific feature
    # that apm does not understand. They are installed via the legacy
    # `claude plugin install <name>@claude-plugins-official` path.

    # superpowers is a referenced URL source from claude-plugins-official's
    # marketplace.json, but lives in its own repo
    - obra/superpowers

    # EveryInc/compound-engineering-plugin (subdir plugins)
    - EveryInc/compound-engineering-plugin/plugins/compound-engineering

    # Single-plugin repos (source: "./" — repo root is the plugin)
    - affaan-m/everything-claude-code
    - jarrodwatts/claude-delegator

    # OthmanAdi/planning-with-files has plugin.json but no marketplace.json,
    # so apm consumes it as a direct plugin dependency rather than via marketplace
    - OthmanAdi/planning-with-files
