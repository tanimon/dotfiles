name: Harness Analysis

on:
  schedule:
    # Weekly: Sunday 00:00 UTC (Monday 09:00 JST)
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Snapshot existing issues
        id: before
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" \
            --label harness-analysis --state open \
            --json number --jq '.[].number' \
            --limit 100 | sort > /tmp/issues-before.txt

      - name: Run Harness Analysis
        id: analysis
        uses: anthropics/claude-code-action@b47fd721da662d48c5680e154ad16a73ed74d2e0 # v1.0.93
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }} # zizmor: ignore[secrets-outside-env]
          prompt: |
            You are a harness engineering analyst. Analyze this repository's harness health and create GitHub Issues for actionable improvements.

            ## Analysis Scope

            Evaluate these areas:

            1. **CLAUDE.md quality** — Is it accurate, concise (<200 lines useful content), and does it cover: project description, common commands, architecture, known pitfalls, testing?
            2. **Project rules** (.claude/rules/) — Are rules specific, actionable, and grounded in real file references? Are any stale or duplicating global rules?
            3. **Hook scripts** (dot_claude/scripts/) — Do they follow the exit code contract (exit 0 for skip, exit 1 + stderr for error)? Are one-shot flags placed after guards?
            4. **CI/lint alignment** — Does the Makefile mirror CI jobs? Are there gaps between local and CI checks?
            5. **Documentation drift** — Do docs/solutions/ entries reference files or patterns that no longer exist? Does CLAUDE.md match current repo state?
            6. **Refactoring candidates** — Are there shell scripts exceeding 200 lines, duplicated patterns across scripts, or overly complex template logic?

            7. **Rule effectiveness** — Scan rule files in `dot_claude/rules/` and `.claude/rules/` for optional YAML frontmatter with `date` and `trigger` fields. Flag rules older than 90 days (by frontmatter `date` or git creation date) that have no related recent issues or commits as "potentially stale". Include a rule health summary in the GitHub Step Summary output via `$GITHUB_STEP_SUMMARY`.

            8. **Instinct health** (ECC continuous learning) — This analysis area applies only when instinct data is available in the workspace (e.g., via exported snapshots or artifacts from a prior step). CI runners do not have local `~/.claude/homunculus/` state. If no instinct data is present in the workspace, skip this area entirely without creating an issue. When data is available:
               - Flag instincts with decaying confidence (< 0.3) as candidates for pruning
               - Flag contradicting instincts (same trigger text, different actions) as needing resolution
               - Flag instincts with confidence >= 0.8 appearing in 2+ projects as promotion candidates (project → global)

            ## Process

            1. Read CLAUDE.md, .claude/rules/*.md, dot_claude/commands/*.md, dot_claude/scripts/*, Makefile, and .github/workflows/*.yml
            2. Check for stale references (file paths that no longer exist, outdated command examples)
            3. Check for pattern violations against the rules themselves
            4. Scan rule files in `dot_claude/rules/**/*.md` and `.claude/rules/*.md`:
               - Check for YAML frontmatter (`date`, `trigger` fields)
               - Determine rule age from frontmatter `date` or `git log --diff-filter=A`
               - Flag rules older than 90 days with no recent related commits as "potentially stale"
               - Write a "Rule Health" section to `$GITHUB_STEP_SUMMARY` with counts of active, stale, and untracked rules
            5. List existing open issues with the harness-analysis label:
               ```
               gh issue list --label harness-analysis --state open --json number,title
               ```
            6. For each NEW finding (not already covered by an open issue):
               - Only create an issue if the finding is actionable and specific
               - Skip generic observations like "could be better documented"
               - Each issue must name exact file paths and recommend a concrete action

            ## Issue Creation

            For each actionable finding, create an issue:
            ```
            gh issue create \
              --label harness-analysis \
              --title "[harness] <concise description>" \
              --body "<structured body with: ## Problem, ## Files, ## Suggested Action>"
            ```

            ## Rules
            - Maximum 5 issues per run to avoid noise
            - Skip findings already covered by open harness-analysis issues
            - Every issue must reference specific file paths
            - If no actionable improvements are found, create no issues — this is a valid outcome
          claude_args: '--allowedTools "Bash(git status),Bash(git log),Bash(git diff),Bash(gh issue *),Bash(gh label *),Bash(cat *),Bash(find *),Bash(wc *),Read,Glob,Grep"'

      - name: Generate summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get current open issues
          gh issue list --repo "$GITHUB_REPOSITORY" \
            --label harness-analysis --state open \
            --json number,title,url \
            --limit 100 > /tmp/issues-after.json

          # Extract numbers from after-snapshot (lexicographic sort for comm)
          jq -r '.[].number' /tmp/issues-after.json | sort > /tmp/issues-after-numbers.txt

          # Ensure before-snapshot exists (may be missing if prior step failed)
          touch /tmp/issues-before.txt

          # Find newly created issues (in after but not in before)
          new_numbers=$(comm -23 /tmp/issues-after-numbers.txt /tmp/issues-before.txt)
          new_count=$(echo "$new_numbers" | grep -c '[0-9]' || true)

          # Write summary
          {
            echo "## Harness Analysis Results"
            echo ""
            if [ "$new_count" -eq 0 ]; then
              echo "> No new issues found — harness is healthy."
            else
              echo "**${new_count} new issue(s) created:**"
              echo ""
              for num in $new_numbers; do
                title=$(jq -r --argjson n "$num" '.[] | select(.number == $n) | .title' /tmp/issues-after.json)
                url=$(jq -r --argjson n "$num" '.[] | select(.number == $n) | .url' /tmp/issues-after.json)
                echo "- [#${num} ${title}](${url})"
              done
            fi
            echo ""
            total=$(jq length /tmp/issues-after.json)
            echo "---"
            echo "_Total open harness-analysis issues: ${total}_"
          } >> "$GITHUB_STEP_SUMMARY"
