name: Security Alerts

on:
  schedule:
    # Weekly: Saturday 00:00 UTC (Saturday 09:00 JST)
    - cron: "0 0 * * 6"
  workflow_dispatch:
    inputs:
      alert_type:
        description: "Alert type to process (dependabot, code-scanning, secret-scanning, all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - dependabot
          - code-scanning
          - secret-scanning

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: read
      id-token: write
    concurrency:
      group: security-sweep
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Snapshot existing issues
        id: before
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" \
            --label security --state open \
            --json number --jq '.[].number' \
            --limit 100 | sort > /tmp/issues-before.txt

      - name: Determine alert scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "alert_type=${{ inputs.alert_type }}" >> "$GITHUB_OUTPUT"
          else
            echo "alert_type=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Check GitHub App availability
        id: check-app
        env:
          APP_ID: ${{ secrets.SECURITY_APP_ID }} # zizmor: ignore[secrets-outside-env]
          APP_PRIVATE_KEY: ${{ secrets.SECURITY_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_PRIVATE_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::SECURITY_APP_ID/SECURITY_APP_PRIVATE_KEY secrets not configured — Dependabot and secret-scanning alerts will be skipped"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate security alerts token
        if: steps.check-app.outputs.available == 'true'
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.SECURITY_APP_ID }} # zizmor: ignore[secrets-outside-env]
          private-key: ${{ secrets.SECURITY_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
          permission-vulnerability-alerts: read
          permission-secret-scanning-alerts: read

      - name: Gather security alerts
        id: alerts
        env:
          # GitHub App token for Dependabot/Secret Scanning (empty when secrets are not configured)
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          # GITHUB_TOKEN works for code-scanning with security-events: read
          GH_DEFAULT_TOKEN: ${{ github.token }}
          ALERT_SCOPE: ${{ steps.scope.outputs.alert_type }}
        run: |
          scope="$ALERT_SCOPE"
          errors=""

          gather_alerts() {
            local type="$1" endpoint="$2" jq_filter="$3" token="$4"
            if [ "$scope" = "all" ] || [ "$scope" = "$type" ]; then
              if [ -z "$token" ]; then
                echo "::warning::Skipping $type alerts — GitHub App token not available (configure SECURITY_APP_ID and SECURITY_APP_PRIVATE_KEY secrets)" >&2
                echo "[]"
                return
              fi
              local result
              if result=$(GH_TOKEN="$token" gh api "repos/$GITHUB_REPOSITORY/$endpoint" 2>&1); then
                echo "$result" | jq -c "[.[] | select(.state == \"open\") | $jq_filter]"
              else
                echo "::warning::Failed to fetch $type alerts: $result" >&2
                errors="${errors}${type}: ${result}\n"
                echo "[]"
              fi
            else
              echo "[]"
            fi
          }

          dep=$(gather_alerts dependabot dependabot/alerts \
            '{number, type: "dependabot", package: .dependency.package.name, severity: .security_vulnerability.severity}' \
            "$APP_TOKEN")
          cs=$(gather_alerts code-scanning code-scanning/alerts \
            '{number, type: "code-scanning", rule: .rule.description, severity: .rule.security_severity_level}' \
            "$GH_DEFAULT_TOKEN")
          ss=$(gather_alerts secret-scanning secret-scanning/alerts \
            '{number, type: "secret-scanning", secret_type}' \
            "$APP_TOKEN")

          jq -n --argjson dep "$dep" --argjson cs "$cs" --argjson ss "$ss" \
            '{dependabot: $dep, code_scanning: $cs, secret_scanning: $ss}' > /tmp/security-alerts.json

          # Summary for logging
          echo "Dependabot: $(echo "$dep" | jq length) open"
          echo "Code scanning: $(echo "$cs" | jq length) open"
          echo "Secret scanning: $(echo "$ss" | jq length) open"
          if [ -n "$errors" ]; then
            echo "::warning::Some alert APIs returned errors (see above)"
          fi

          total=$(jq '(.dependabot | length) + (.code_scanning | length) + (.secret_scanning | length)' /tmp/security-alerts.json 2>/dev/null || echo 0)
          if [ "$total" -gt 0 ]; then
            echo "has_alerts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_alerts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sweep security alerts
        if: steps.alerts.outputs.has_alerts == 'true'
        uses: anthropics/claude-code-action@ef50f123a3a9be95b60040d042717517407c7256 # v1.0.110
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }} # zizmor: ignore[secrets-outside-env]
          use_commit_signing: true
          prompt: |
            Run a sweep of all open security alerts in this repository. Process alert type: ${{ steps.scope.outputs.alert_type }}

            ## Instructions

            1. Read pre-fetched alert data from `/tmp/security-alerts.json`:
               ```bash
               cat /tmp/security-alerts.json
               ```
               This file contains JSON with `dependabot`, `code_scanning`, and `secret_scanning` arrays of open alerts.

            2. Check which alerts already have associated PRs or issues:
               ```bash
               gh pr list --search "security" --json number,title --limit 50
               gh issue list --label security --state open --json number,title --limit 50
               ```

            3. For each unhandled alert, follow the same logic as the individual handlers:
               - **Dependabot**: Check for Renovate PRs, attempt fix or create issue
               - **Code scanning**: Analyze and fix if low-risk, create issue if high-risk
               - **Secret scanning**: Always create high-priority issue

            4. Write a summary of actions taken.

            ## Rules
            - Skip alerts that already have associated PRs or issues
            - Maximum 5 alerts processed per sweep run
            - Run `make lint` before any commits
            - NEVER log or display actual secret values
            - For secret scanning alerts, ONLY create issues — never attempt fixes
          claude_args: '--allowedTools "Bash(git *),Bash(gh *),Bash(make *),Bash(pnpm *),Bash(cat *),Read,Write,Edit,Glob,Grep"'

      - name: Generate summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" \
            --label security --state open \
            --json number,title,url \
            --limit 100 > /tmp/issues-after.json

          jq -r '.[].number' /tmp/issues-after.json | sort > /tmp/issues-after-numbers.txt

          touch /tmp/issues-before.txt

          new_numbers=$(comm -23 /tmp/issues-after-numbers.txt /tmp/issues-before.txt)
          new_count=$(echo "$new_numbers" | grep -c '[0-9]' || true)

          {
            echo "## Security Alerts Sweep Results"
            echo ""
            if [ "$new_count" -eq 0 ]; then
              echo "> No new security issues created — all alerts handled or already tracked."
            else
              echo "**${new_count} new issue(s) created:**"
              echo ""
              for num in $new_numbers; do
                title=$(jq -r --argjson n "$num" '.[] | select(.number == $n) | .title' /tmp/issues-after.json)
                url=$(jq -r --argjson n "$num" '.[] | select(.number == $n) | .url' /tmp/issues-after.json)
                echo "- [#${num} ${title}](${url})"
              done
            fi
            echo ""

            echo "### Alert Summary"
            # Read counts from pre-fetched data (avoids GITHUB_TOKEN permission issues)
            if [ -f /tmp/security-alerts.json ]; then
              dep_count=$(jq '.dependabot | length' /tmp/security-alerts.json)
              cs_count=$(jq '.code_scanning | length' /tmp/security-alerts.json)
              ss_count=$(jq '.secret_scanning | length' /tmp/security-alerts.json)
            else
              dep_count="N/A"
              cs_count="N/A"
              ss_count="N/A"
            fi
            echo "- Dependabot: ${dep_count} open"
            echo "- Code scanning: ${cs_count} open"
            echo "- Secret scanning: ${ss_count} open"
          } >> "$GITHUB_STEP_SUMMARY"
