name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secretlint:
    name: Secretlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec secretlint '**/*'

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          find . -type f \( -name '*.sh' -o -name '*.bash' \) \
            ! -name '*.tmpl' \
            ! -path './node_modules/*' \
            -print0 | xargs -0 -r shellcheck

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          SHFMT_VERSION=3.11.0
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt
      - name: Run shfmt
        run: |
          find . -type f \( -name '*.sh' -o -name '*.bash' \) \
            ! -name '*.tmpl' \
            ! -path './node_modules/*' \
            -print0 | xargs -0 -r shfmt -d -i 4

  chezmoi-templates:
    name: chezmoi templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
      - name: Create test config
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          printf '[data]\n  profile = "personal"\n  ghOrg = "test-org"\n' > "$HOME/.config/chezmoi/chezmoi.toml"
      - name: Validate templates
        run: |
          find . -name '*.tmpl' \
            ! -path './node_modules/*' \
            ! -name '.chezmoi.toml.tmpl' \
            -print0 | while IFS= read -r -d '' file; do
            echo "Validating: ${file}"
            chezmoi execute-template \
              --config "$HOME/.config/chezmoi/chezmoi.toml" \
              --source "$(pwd)" \
              < "$file" > /dev/null || {
              echo "::error file=${file}::Template validation failed"
              exit 1
            }
          done
