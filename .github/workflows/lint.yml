name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secretlint:
    name: Secretlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: make secretlint

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make shellcheck

  shfmt:
    name: shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shfmt
        run: |
          SHFMT_VERSION=3.11.0
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt
      - run: make shfmt

  modify-scripts:
    name: modify_ script smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test-modify

  harness-scripts:
    name: harness script smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make test-scripts

  chezmoi-templates:
    name: chezmoi templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin
      - run: make check-templates
