name: Auto-Promote Instincts

on:
  schedule:
    # Weekly: Sunday 01:00 UTC (Monday 10:00 JST) — offset from harness-analysis at 00:00
    - cron: "0 1 * * 0"
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    concurrency:
      group: auto-promote
      cancel-in-progress: false
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate instinct snapshot
        id: health
        run: |
          if bash scripts/validate-instinct-snapshot.sh > /tmp/health-result.json 2>&1; then
            echo "gate=pass" >> "$GITHUB_OUTPUT"
            cat /tmp/health-result.json
          else
            echo "gate=fail" >> "$GITHUB_OUTPUT"
            cat /tmp/health-result.json
            {
              echo "## Auto-Promote: Health Gate Failed"
              echo ""
              echo '```json'
              cat /tmp/health-result.json
              echo '```'
              echo ""
              echo "Promotion skipped. Run \`scripts/snapshot-instincts.sh\` locally and push."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Promote instincts
        if: steps.health.outputs.gate == 'pass'
        uses: anthropics/claude-code-action@58dbe8ed6879f0d3b02ac295b20d5fdfe7733e0c # v1.0.85
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }} # zizmor: ignore[secrets-outside-env]
          prompt: |
            PLACEHOLDER: promotion prompt will be added in Unit 5
          claude_args: '--allowedTools "Read,Write,Edit,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git checkout:*),Bash(gh pr create:*),Bash(cat *),Bash(find *),Glob,Grep"'

      - name: Generate summary
        if: always() && steps.health.outputs.gate == 'pass'
        run: |
          {
            echo "## Auto-Promote Instincts Results"
            echo ""
            echo "Promotion workflow completed. Check git log for promoted rules."
          } >> "$GITHUB_STEP_SUMMARY"
