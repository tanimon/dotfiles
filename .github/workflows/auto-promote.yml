name: Auto-Promote Instincts

on:
  schedule:
    # Weekly: Sunday 01:00 UTC (Monday 10:00 JST) â€” offset from harness-analysis at 00:00
    - cron: "0 1 * * 0"
  workflow_dispatch:

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    concurrency:
      group: auto-promote
      cancel-in-progress: false
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate instinct snapshot
        id: health
        run: |
          if bash scripts/validate-instinct-snapshot.sh > /tmp/health-result.json 2>/tmp/health-errors.log; then
            echo "gate=pass" >> "$GITHUB_OUTPUT"
            cat /tmp/health-result.json
          else
            echo "gate=fail" >> "$GITHUB_OUTPUT"
            cat /tmp/health-errors.log >&2 || true
            {
              echo "## Auto-Promote: Health Gate Failed"
              echo ""
              echo '```json'
              cat /tmp/health-result.json 2>/dev/null || echo '{"status":"failed","reason":"no output"}'
              echo '```'
              echo ""
              echo "Promotion skipped. Run \`scripts/snapshot-instincts.sh\` locally and push."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Promote instincts
        if: steps.health.outputs.gate == 'pass'
        id: promote
        uses: anthropics/claude-code-action@58dbe8ed6879f0d3b02ac295b20d5fdfe7733e0c # v1.0.85
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }} # zizmor: ignore[secrets-outside-env]
          prompt: |
            You are an instinct-to-rule promotion agent. Your job is to read ECC instinct snapshots, identify promotion candidates, and convert them into permanent harness rules.

            ## 1. Read Instinct Snapshot

            Read all `.md` files in `dot_claude/instinct-snapshots/`. Each file has YAML frontmatter with fields: `id`, `trigger`, `confidence`, `domain`, `scope`, `project_id`, `project_name`. The body contains `## Action` and `## Evidence` sections.

            Also read `dot_claude/instinct-snapshots/metadata.json` for snapshot metadata.

            ## 2. Filter Candidates

            An instinct is a promotion candidate if ALL of these are true:
            - `confidence >= 0.7`
            - `domain` is NOT `debugging` (meta-instincts about the observer itself are excluded)
            - The trigger does not reference "observer", "ECC", or "homunculus" (these are system meta-patterns)

            If no candidates pass, write a step summary saying "0 candidates met promotion threshold" and exit.

            ## 3. Deduplicate Against Existing Rules

            Read all existing rule files:
            - `.claude/rules/` (project rules in source tree)
            - `dot_claude/rules/` (global rules deployed to `~/.claude/rules/`)
            - `CLAUDE.md` (project-level documentation that may contain rule-like guidance)

            For each candidate, assess whether the instinct's trigger and action are **already substantially covered** by an existing rule. Use semantic similarity, not keyword matching. An instinct that says "always validate JSON with jq before piping" is covered if a rule already says "use jq to validate JSON output". Mark covered instincts as "duplicate" and skip them.

            ## 4. Classify Risk Tier

            For each remaining candidate:
            - **Low-risk** (auto-merge PR): `domain` is `code-style`, `file-patterns`, `naming`, or `documentation`
            - **High-risk** (PR with review required): everything else (`workflow`, `security`, `hooks`, `ci`, `testing`, etc.)

            ## 5. Format Promoted Rule

            Convert each candidate to a rule section. The rule should be appended to the most appropriate existing rule file based on domain:
            - `code-style` â†’ `.claude/rules/chezmoi-patterns.md` or appropriate file
            - `file-patterns` â†’ `.claude/rules/chezmoi-patterns.md`
            - `shell` or `scripts` â†’ `.claude/rules/shell-scripts.md`
            - Other domains â†’ create new section in the most relevant file, or create a new file if no existing file fits

            Rule format:
            ```markdown
            ## <trigger text>

            <action text, expanded into clear actionable guidance>

            _Promoted from ECC instinct `<id>` on <today's date> (confidence: <score>)_
            ```

            ## 6. Apply Changes

            **IMPORTANT: Collect all changes first, then commit atomically.**

            **All promotions go through PRs** (direct push to main is not allowed).

            ### For low-risk promotions:
            1. Create a branch: `git checkout -b chore/auto-promote-low-risk-<first-id>`
            2. Write all rule additions to their target files
            3. Run `make lint` â€” if it fails, fix the issue and re-run. Do NOT proceed to git operations until lint passes.
            4. Stage and commit: `chore(harness): auto-promote instincts [<comma-separated ids>]`
            5. Push: `git push -u origin HEAD`
            6. Create PR with auto-merge label:
               ```
               gh pr create \
                 --title "chore(harness): auto-promote low-risk instincts" \
                 --body "## Promoted Instincts\n\n<list each instinct id, trigger, domain, confidence>\n\n## Risk Assessment\n\nLow-risk domains (code-style, file-patterns, naming, documentation). Auto-merge eligible.\n\n## Rules Added\n\n<list each new rule section and target file>"
               ```

            ### For high-risk promotions:
            1. Create a branch: `git checkout -b feat/auto-promote-<first-id>`
            2. Write rule additions
            3. Run `make lint` â€” if it fails, fix the issue and re-run. Do NOT proceed to git operations until lint passes.
            4. Stage and commit: `chore(harness): auto-promote instincts [<ids>] (review required)`
            5. Push: `git push -u origin HEAD`
            6. Create PR:
               ```
               gh pr create \
                 --title "chore(harness): auto-promote high-risk instincts" \
                 --body "## Promoted Instincts\n\n<list each instinct id, trigger, domain, confidence>\n\n## Risk Assessment\n\nHigh-risk domains require human review before merge.\n\n## Rules Added\n\n<list each new rule section and target file>"
               ```

            If there are both low-risk and high-risk candidates in the same run:
            - Create one PR for low-risk promotions
            - Create a separate PR for high-risk promotions

            ## 7. Write Step Summary

            Write to `$GITHUB_STEP_SUMMARY`:
            ```markdown
            ## Auto-Promote Instincts Results

            **Snapshot:** <instinct_count> instincts, <age> days old
            **Candidates:** <N> met threshold (confidence >= 0.7)
            **Duplicates:** <N> already covered by existing rules
            **Promoted:** <N> (<low-risk count> via low-risk PR, <high-risk count> via high-risk PR)
            **Skipped:** <N> (reasons)

            ### Promoted Rules
            | Instinct ID | Domain | Confidence | Target File | Risk |
            |-------------|--------|------------|-------------|------|
            | ... | ... | ... | ... | low/high |
            ```

            ## Rules

            - NEVER modify existing rule content â€” only APPEND new sections
            - NEVER edit CLAUDE.md
            - NEVER delete or modify instinct snapshot files
            - Always run `make lint` after writing rules to verify no formatting issues
            - If `make lint` fails, fix the issue before committing
            - NEVER push directly to main â€” main branch is protected. Always create a feature branch and PR.
            - Project instincts only â€” do NOT look for global instincts outside the snapshot
          claude_args: '--allowedTools "Read,Write,Edit,Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git checkout:*),Bash(gh pr create:*),Bash(cat dot_claude/instinct-snapshots/*),Bash(find dot_claude/instinct-snapshots*),Bash(make lint),Glob,Grep"'

      - name: Generate summary
        if: always() && steps.health.outputs.gate == 'pass'
        env:
          PROMOTE_RESULT: ${{ steps.promote.outcome }}
        run: |
          if [ "$PROMOTE_RESULT" = "success" ]; then
            echo "Auto-promote step completed successfully." >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo ""
              echo "---"
              echo "**Note:** Promotion step did not complete successfully (outcome: ${PROMOTE_RESULT})."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
