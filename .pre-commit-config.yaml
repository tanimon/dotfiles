repos:
  - repo: local
    hooks:
      - id: secretlint
        name: secretlint
        entry: pnpm exec secretlint
        language: system
        types: [text]
      - id: shellcheck
        name: shellcheck
        entry: bash -c 'if command -v shellcheck &>/dev/null; then shellcheck "$@"; else echo "shellcheck not found, skipping"; fi' --
        language: system
        files: '(\.sh$|\.bash$|\.chezmoiscripts/|executable_)'
        exclude: '(\.tmpl$|\.mts$|\.ts$|\.mjs$)'
        types: [file]
      - id: shfmt
        name: shfmt
        entry: bash -c 'if command -v shfmt &>/dev/null; then shfmt -d -i 4 "$@"; else echo "shfmt not found, skipping"; fi' --
        language: system
        files: '(\.sh$|\.bash$|\.chezmoiscripts/|executable_)'
        exclude: '(\.tmpl$|\.mts$|\.ts$|\.mjs$)'
        types: [file]
      - id: oxlint
        name: oxlint
        entry: pnpm exec oxlint
        language: system
        files: '\.(js|mjs|mts|ts)$'
        exclude: '\.tmpl$'
        types: [file]
      - id: oxfmt
        name: oxfmt
        entry: pnpm exec oxfmt --check
        language: system
        files: '\.(js|mjs|mts|ts|json)$'
        exclude: '(\.tmpl$|modify_)'
        types: [file]
      - id: actionlint
        name: actionlint
        entry: bash -c 'if command -v actionlint &>/dev/null; then actionlint "$@"; else echo "actionlint not found, skipping"; fi' --
        language: system
        files: '\.github/workflows/.*\.yml$'
        types: [file]
      - id: zizmor
        name: zizmor
        entry: bash -c 'if command -v zizmor &>/dev/null; then zizmor "$@"; else echo "zizmor not found, skipping"; fi' --
        language: system
        files: '\.github/workflows/.*\.yml$'
        types: [file]
